[theme]
# Premium dark theme — emerald + amber financial palette
primaryColor = "#10b981"
backgroundColor = "#070c17"
secondaryBackgroundColor = "#0a1020"
textColor = "#e2e8f0"
font = "sans serif"

[server]
headless = true
runOnSave = false
# Increase limit for large dataframes (500-stock universe)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
# Disable magic — all st.* calls are explicit
magicEnabled = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
