[theme]
# Dark purple-crimson theme — deep space with gradient accents
primaryColor = "#8B5CF6"
backgroundColor = "#0A0812"
secondaryBackgroundColor = "#130E24"
textColor = "#F1F5F9"
font = "sans serif"

[server]
headless = true
runOnSave = false
# Increase limit for large dataframes (500-stock universe)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
# Disable magic — all st.* calls are explicit
magicEnabled = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
