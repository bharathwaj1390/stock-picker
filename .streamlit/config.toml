[theme]
# Clean light theme — white canvas with emerald accent
primaryColor = "#059669"
backgroundColor = "#f8fafc"
secondaryBackgroundColor = "#ffffff"
textColor = "#0f172a"
font = "sans serif"

[server]
headless = true
runOnSave = false
# Increase limit for large dataframes (500-stock universe)
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
# Disable magic — all st.* calls are explicit
magicEnabled = false

[client]
showErrorDetails = true
toolbarMode = "minimal"
